<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Резюме + задания</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="resume">
        <h1>Резюме</h1>
        <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Фото">
        <p><strong>Имя:</strong> Евгений</p>
        <p><strong>Фамилия:</strong> <span id="lastname">Смирнов</span></p>
        
        <input type="text" id="newLastName" placeholder="Новая фамилия">
        <button onclick="changeLastName()">Изменить фамилию</button>
    </div>

    <div class="task">
        <h2>Задание 1: min(a, b)</h2>
        <input type="number" id="a" value="5">
        <input type="number" id="b" value="3">
        <button onclick="showMin()">Найти минимум</button>
        <p>Результат: <span id="result">—</span></p>
    </div>

    <div class="task">
        <h2>Задание 2: переменные admin и name</h2>
        <button onclick="showAdmin()">Вывести admin</button>
        <p>admin = <span id="adminResult">—</span></p>
    </div>

    <div class="task">
        <h2>Задание 3: проверка возраста</h2>
        <button onclick="askAge()">Ввести возраст</button>
    </div>

    <script>
        function min(a, b) {
            if (a < b) return a;
            else return b;
        }

        function showMin() {
            let a = Number(document.getElementById('a').value);
            let b = Number(document.getElementById('b').value);
            document.getElementById('result').innerHTML = min(a, b);
        }

        let name = "Евгений";
        let admin = name;

        function showAdmin() {
            document.getElementById('adminResult').innerHTML = admin;
        }

        function askAge() {
            let age;
            do {
                age = prompt("Сколько вам лет?");
                if (age === null) continue;
                age = Number(age);
                if (isNaN(age)) {
                    alert("Введите число");
                    age = null;
                }
            } while (age === null);
            
            if (confirm("Вам " + age + " лет?")) {
                alert("Спасибо!");
            } else {
                askAge();
            }
        }

        function changeLastName() {
            let newName = document.getElementById('newLastName').value;
            if (newName !== "") {
                document.getElementById('lastname').innerHTML = newName;
            } else {
                alert("Введите фамилию");
            }
        }
    </script>
</body>
</html>
