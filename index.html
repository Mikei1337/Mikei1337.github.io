<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>min(a,b) + переменные + возраст</title>
</head>
<body>
    <h1>Задание 1: min(a, b)</h1>
    
    <label>Число A: </label>
    <input type="number" id="a" value="5">
    <br><br>
    
    <label>Число B: </label>
    <input type="number" id="b" value="3">
    <br><br>
    
    <button onclick="showMin()">Найти минимум</button>
    
    <h2>Результат: <span id="result">—</span></h2>

    <hr>

    <h1>Задание 2: переменные admin и name</h1>
    <button onclick="showAdmin()">Вывести admin</button>
    <h2>admin = <span id="adminResult">—</span></h2>

    <hr>

    <h1>Задание 3: проверка возраста</h1>
    <button onclick="askAge()">Ввести возраст</button>

    <script>
        function min(a, b) {
            if (a < b) {
                return a;
            } else {
                return b;
            }
        }

        function showMin() {
            let a = Number(document.getElementById('a').value);
            let b = Number(document.getElementById('b').value);
            let result = min(a, b);
            document.getElementById('result').innerHTML = result;
        }

        let name = "Евгений";
        let admin = name;

        function showAdmin() {
            document.getElementById('adminResult').innerHTML = admin;
        }

        function askAge() {
            let age;
            do {
                age = prompt("Сколько вам лет?");
                if (age === null) {
                    continue;
                }
                age = Number(age);
                if (isNaN(age)) {
                    alert("Пожалуйста, введите число");
                    age = null;
                }
            } while (age === null);
            
            let confirmAge = confirm("Вам " + age + " лет?");
            if (confirmAge === true) {
                alert("Спасибо!");
            } else {
                askAge();
            }
        }
    </script>
</body>
</html>
